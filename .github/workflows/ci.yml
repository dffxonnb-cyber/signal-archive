name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Check canonical content path
        run: node scripts/check-content-consistency.mjs structure

      - name: Check representative project contracts
        if: always()
        run: node scripts/check-content-consistency.mjs representative

      - name: Check project slugs and routes
        if: always()
        run: node scripts/check-content-consistency.mjs routes

      - name: Check public evidence assets
        if: always()
        run: node scripts/check-content-consistency.mjs assets

      - name: Check documentation links and URLs
        if: always()
        run: node scripts/check-content-consistency.mjs docs

      - name: Check stale hiring-facing wording
        if: always()
        run: node scripts/check-content-consistency.mjs stale

  verify:
    needs: content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
