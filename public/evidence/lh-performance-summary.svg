<text x="96" y="352" font-size="40" font-weight="800" fill="#f3d38a" text-anchor="start">100m × 100m</text>
<text x="96" y="390" font-size="18" font-weight="500" fill="#b5c7c4" text-anchor="start">시설 검토를 위한 세밀한 공간 단위</text>
