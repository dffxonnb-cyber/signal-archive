<text x="986" y="490" font-size="18" font-weight="700" fill="#8db6ae" text-anchor="start">WORST HOLDOUT AUC</text>
<text x="986" y="546" font-size="40" font-weight="800" fill="#f3d38a" text-anchor="start">0.7979</text>
<text x="986" y="584" font-size="18" font-weight="500" fill="#b5c7c4" text-anchor="start">가장 불리한 홀드아웃 결과</text>
<rect x="72" y="670" width="1266" height="118" rx="18" fill="#102025" stroke="#4c736d"/>
<text x="96" y="710" font-size="17" font-weight="800" fill="#8db6ae" text-anchor="start">INTERPRETATION</text>
<text x="96" y="750" font-size="22" font-weight="650" fill="#e6efeb" text-anchor="start">이 수치는 실제 사고 감소 효과가 아니라 현장 점검 후보를 우선순위화하는 의사결정 보조 신호입니다.</text>
<text x="96" y="780" font-size="17" font-weight="500" fill="#a9bebb" text-anchor="start">검증 원본 재산출에는 비공개 공모전 데이터가 필요하며, 공개 저장소는 요약 지표와 안전한 산출물을 제공합니다.</text>
<text x="1338" y="832" font-size="15" font-weight="500" fill="#718c89" text-anchor="end">Generated from public-safe repository evidence</text>
