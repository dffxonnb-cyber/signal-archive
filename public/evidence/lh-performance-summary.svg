<text x="72" y="154" font-size="42" font-weight="800" fill="#f3f7f5" text-anchor="start">100m 격자 교통사고 고위험 신호 분석</text>
<text x="72" y="198" font-size="22" font-weight="500" fill="#b5c7c4" text-anchor="start">기존 4개 시·구의 공간 패턴을 검증하고 하남교산 현장 검토 우선 후보로 전환</text>
